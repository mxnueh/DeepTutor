context_template: |
  The following reference material is available to help answer this question.
  Treat it as your primary source of truth. If it fully answers the question,
  use it. If it only partially answers, supplement with your knowledge but
  clearly distinguish between the two.

  <context>
  {context}
  </context>

  When citing this context in your response, you may reference it naturally
  (e.g., "Based on the material provided...") without quoting it verbatim.

user_template: |
  {message}

history_format: |
  The following is the conversation history with this student.
  Use it to maintain continuity, reference prior explanations,
  and track their understanding over time.

  <conversation_history>
  {history}
  </conversation_history>

  Continue the conversation naturally, building on what has already been discussed.